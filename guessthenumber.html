<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guess the Number</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      text-align: center;
    }
    h1 {
      color: #333;
    }
    .input-field {
      margin-top: 20px;
    }
    button {
      background-color: #4CAF50;
      color: white;
      padding: 10px 20px;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
    button:hover {
      background-color: #45a049;
    }
    .result {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Guess the Number Game</h1>
    <p>Guess a number between 1 and 100:</p>
    <div class="input-field">
      <input type="number" id="guess" min="1" max="100" required>
      <button onclick="checkGuess()">Check</button>
    </div>
    <div class="result" id="result"></div>
  </div>

  <script>
    // Generate a random number between 1 and 100
    const randomNumber = Math.floor(Math.random() * 100) + 1;

    function checkGuess() {
      const guess = parseInt(document.getElementById('guess').value);
      const resultElement = document.getElementById('result');

      if (isNaN(guess) || guess < 1 || guess > 100) {
        resultElement.textContent = 'Please enter a valid number between 1 and 100.';
      } else if (guess === randomNumber) {
        resultElement.textContent = 'Congratulations! You guessed the correct number!';
        resultElement.style.color = 'green';
        document.getElementById('guess').disabled = true;
      } else {
        const message = guess < randomNumber ? 'Too low! Try again.' : 'Too high! Try again.';
        resultElement.textContent = message;
        resultElement.style.color = 'red';
      }
    }
  </script>
</body>
</html>
