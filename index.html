<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Links</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    .game-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }
    .game {
      text-align: center;
      margin: 10px;
    }
    .game a {
      display: block;
      text-decoration: none;
      color: #333;
    }
    .game img {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 10px;
    }
    .game p {
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="game">
      <a href="game1.html">
        <img src="game1.png" alt="Game 1">
        <p>Game 1</p>
      </a>
    </div>
    <div class="game">
      <a href="game2.html">
        <img src="game2.png" alt="Game 2">
        <p>Game 2</p>
      </a>
    </div>
    <!-- Add more game entries as needed -->
  </div>
</body>
</html>
